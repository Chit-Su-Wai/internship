<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #d9d9d9;
      }

      .calculator {
        width: 270px;
        background: #f7f8fc;
        border-radius: 28px;
        padding: 25px 15px 12px;
      }

      .display {
        width: 100%;
        height: 120px;
    
        border: none;
        outline: none;
        background: transparent;
        text-align: right;
        font-size: 30px;
        color: #4f82c3;
        padding: 10px;
        white-space: nowrap;
        overflow-x: auto;
      }
      
      .display::-webkit-scrollbar {
        display: none;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
      }

      button {
        height: 52px;
        border: none;
        border-radius: 50%;
        background: #eef2f9;
        font-size: 24px;
        cursor: pointer;
      }

      .red {
        color: #ff5b6e;
      }

      .blue {
        color: #5d8ecb;
      }

      .pink {
        color: #cf5d86;
      }

      .equal {
        background: #d96b95;
        color: white;
      }

      .bottom-bar {
        width: 90px;
        height: 4px;
        background: #555;
        border-radius: 10px;
        margin: 15px auto 0;
      }
    </style>
  </head>

  <body>
    <div class="calculator">
      <input type="text" id="display" class="display" value="0" />

      <div class="buttons">
        <button class="red" onclick="clearDisplay()">C</button>

        <button class="red" onclick="backspace()">⌫</button>

        <button class="blue" onclick="appendValue('%')">%</button>

        <button class="pink" onclick="appendValue('/')">÷</button>

        <button class="blue" onclick="appendValue('7')">7</button>

        <button class="blue" onclick="appendValue('8')">8</button>

        <button class="blue" onclick="appendValue('9')">9</button>

        <button class="pink" onclick="appendValue('*')">×</button>

        <button class="blue" onclick="appendValue('4')">4</button>

        <button class="blue" onclick="appendValue('5')">5</button>

        <button class="blue" onclick="appendValue('6')">6</button>

        <button class="pink" onclick="appendValue('-')">−</button>

        <button class="blue" onclick="appendValue('1')">1</button>

        <button class="blue" onclick="appendValue('2')">2</button>

        <button class="blue" onclick="appendValue('3')">3</button>

        <button class="pink" onclick="appendValue('+')">+</button>

        <button class="blue" onclick="appendParentheses()">()</button>

        <button class="blue" onclick="appendValue('0')">0</button>

        <button class="blue" onclick="appendValue('.')">.</button>

        <button class="equal" onclick="calculate()">=</button>
      </div>

      <div class="bottom-bar"></div>
    </div>

    <script>
      const display = document.getElementById("display");

      let expression = "";

      function updateDisplay() {
        display.value = expression || "0";
        display.scrollLeft = display.scrollWidth;
      }
      function appendValue(value) {
        let start = display.selectionStart;
        let end = display.selectionEnd;

        let lastChar = expression[start - 1];

        let operators = ["+", "-", "*", "/", "%"];

        if (operators.includes(lastChar) && operators.includes(value)) {
          return;
        }

        expression = expression.slice(0, start) + value + expression.slice(end);

        updateDisplay();

        setTimeout(() => {
          display.selectionStart = display.selectionEnd = start + 1;
        }, 0);
      }
      function backspace() {
        expression = expression.slice(0, -1);

        updateDisplay();
      }
      function clearDisplay() {
        expression = "";

        display.value = "0";
      }

      function appendParentheses() {
        let openCount = 0;
        let closeCount = 0;
        for (let char of expression) {
          if (char === "(") {
            openCount++;
          }

          if (char === ")") {
            closeCount++;
          }
        }

        let lastChar = expression[expression.length - 1];

        if (
          openCount === closeCount ||
          lastChar === "+" ||
          lastChar === "-" ||
          lastChar === "*" ||
          lastChar === "/" ||
          lastChar === "("
        ) {
          expression += "(";
        } else {
          expression += ")";
        }

        updateDisplay();
      }

      function calculate() {
        if (expression.trim() === "") {
          expression = "0";
          updateDisplay();
          return;
        }
        try {
          let result = eval(expression.replace(/%/g, "/100"));

          expression = result.toString();

          updateDisplay();
        } catch {
          display.value = "Error";

          expression = "";
        }
      }
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
    <head>
        <title></title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            *{
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            table{
                display: flex;
                border-collapse: collapse;
                width: 90%;
                margin: 20px auto;
                text-align: center;
                justify-content: center;
                
            }
            th,td{
                border: 1px dotted black;
                padding: 6px;
            }
            .right{
                text-align:right;
            }
            .left{
                text-align:left;

            }
        </style>
    </head>
    <body>
        <table>
            <tr>
                <th rowspan="2">No</th>
                <th rowspan="2">Student Name</th>
                <th rowspan="2">Gender</th>
                <th rowspan="2">Roll No.</th>
                <th colspan="3">Marks</th>
            </tr>
            <tr>
                <th class="left">Myanmar</th>
                <th class="left">English</th>
                <th class="left">Maths</th>
            </tr>
            <tr>
                <td>1</td>
                <td class="left">Su Su</td>
                <td rowspan="2">Female</td>
                <td class="left">5CS-32</td>
                <td class="right">60</td>
                <td class="right">75</td>
                <td class="right">86</td>
            </tr>
            <tr>
                <td>2</td>
                <td class="left">Moe Moe</td>
                <td class="left">5CS-33</td>
                <td class="right">78</td>
                <td class="right">86</td>
                <td class="right">84</td>
            </tr>
            <tr>
                <td>3</td>
                <td class="left">Kyaw Kyaw</td>
                <td rowspan="3">Male</td>
                <td class="left">5CS-34</td>
                <td class="right">89</td>
                <td class="right">43</td>
                <td class="right">86</td>
            </tr>
            <tr>
                <td>4</td>
                <td class="left">Mg Mg</td>
                <td class="left">5CS-35</td>
                <td class="right">76</td>
                <td class="right">75</td>
                <td class="right">75</td>
            </tr>
            <tr>
                <td>5</td>
                <td class="left">Aung Aung</td>
                <td class="left">5CS-36</td>
                <td class="right">87</td>
                <td class="right">75</td>
                <td class="right">86</td>
            </tr>
        </table>
    </body>
</html>

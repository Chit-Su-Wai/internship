<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#000;
    }

    .calculator{
      width:320px;
      background:#000;
      padding:20px;
      border-radius:25px;
    }

    .display{
      width:100%;
      height:120px;
      border:none;
      outline:none;
      background:#000;
      color:white;
      font-size:45px;
      text-align:right;
      padding:20px 10px;
      margin-bottom:20px;
    }

    .buttons{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:15px;
    }

    button{
      width:65px;
      height:65px;
      border:none;
      border-radius:50%;
      font-size:28px;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      transform:scale(1.05);
    }

    /* number buttons */
    .num{
      background:#2b2b2f;
      color:white;
    }

    /* top buttons */
    .top{
      background:#6e6488;
      color:white;
    }

    /* operator buttons */
    .operator{
      background:#7c6aa8;
      color:white;
    }

    /* equal button */
    .equal{
      background:#c7a7ff;
      color:white;
    }
  </style>
</head>
<body>

  <div class="calculator">

    <input type="text" class="display" id="display" readonly>

    <div class="buttons">

      <button class="top" onclick="clearDisplay()">C</button>
      <button class="top" onclick="del()">⌫</button>
      <button class="top" onclick="appendValue('%')">%</button>
      <button class="operator" onclick="appendValue('/')">÷</button>

      <button class="num" onclick="appendValue('7')">7</button>
      <button class="num" onclick="appendValue('8')">8</button>
      <button class="num" onclick="appendValue('9')">9</button>
      <button class="operator" onclick="appendValue('*')">×</button>

      <button class="num" onclick="appendValue('4')">4</button>
      <button class="num" onclick="appendValue('5')">5</button>
      <button class="num" onclick="appendValue('6')">6</button>
      <button class="operator" onclick="appendValue('-')"></button>

      <button class="num" onclick="appendValue('1')">1</button>
      <button class="num" onclick="appendValue('2')">2</button>
      <button class="num" onclick="appendValue('3')">3</button>
      <button class="operator" onclick="appendValue('+')">+</button>

      <button class="num" onclick="appendValue()">()</button>
      <button class="num" onclick="appendValue('0')">0</button>
      <button class="num" onclick="appendValue('.')">.</button>
      <button class="equal" onclick="calculate()">=</button>

    </div>
  </div>

  <script>
    const display = document.getElementById("display");
    let expression = "";

    function updateDisplay() {
      display.textContent = expression  "0";
    }

    function append(value) {
      expression += value;
      updateDisplay();
    }

    function clearDisplay() {
      expression = "";
      updateDisplay();
    }

    function backspace() {
      expression = expression.slice(0, -1);
      updateDisplay();
    }

    function appendParentheses() {
      const open = (expression.match(/\(/g)  []).length;
      const close = (expression.match(/\)/g)  []).length;

      if (open === close  /[+\-*/(]$/.test(expression)) {
        expression += "(";
      } else {
        expression += ")";
      }

      updateDisplay();
    }

    function calculate() {
      try {
        let result = Function('"use strict"; return (' + expression.replace(/%/g, "/100") + ')')();
        expression = String(result);
        updateDisplay();
      } catch {
        display.textContent = "Error";
        expression = "";
      }
    }
  </script>

</body>
</html>

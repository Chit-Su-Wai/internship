<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin & Padding Example</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            background: white;
        }

        /* Blue Box */

        .outer-box{
            width: 700px;
            height: 400px;

            background: blue;

            margin: 50px auto;

            padding: 50px;
        }

        /* Brown Box */

        .middle-box{
            width: 500px;
            height: 280px;
            background: burlywood;
            border: 4px solid red;
            border-radius: 20px;
            margin: auto;
            padding: 40px;
        }

        /* White Box */

        .inner-box{
            width: 100%;
            height: 100%;
            background: white;
            border: 3px solid gray;
            border-radius: 20px;
            text-align: center;
            padding-top: 80px;
        }

        .inner-box h1{
            font-size: 35px;
        }

    </style>
</head>
<body>

    <section class="outer-box">

        <section class="middle-box">

            <section class="inner-box">

                <h1>Card Content</h1>

            </section>

        </section>

    </section>

</body>
</html>

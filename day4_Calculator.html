<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #eef3f9;
    }

    .calculator {
      width: 460px;
      background: #ffffff;
      padding: 36px 38px 38px;
      border-radius: 14px;
      box-shadow: 0 18px 35px rgba(0, 0, 0, 0.08);
    }

    h2 {
      text-align: center;
      margin-bottom: 28px;
      font-size: 24px;
      color: #111827;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    input,
    select {
      height: 54px;
      border: 1px solid #d1d8e0;
      border-radius: 6px;
      font-size: 20px;
      padding: 0 12px;
      outline: none;
      background: #ffffff;
    }

    input {
      width: 150px;
    }

    select {
      width: 68px;
      text-align: center;
      cursor: pointer;
    }

    input:focus,
    select:focus {
      border-color: #0d7ff2;
    }

    button {
      width: 100%;
      height: 53px;
      border: none;
      border-radius: 6px;
      background: #0d7ff2;
      color: #ffffff;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 28px;
    }

    button:hover {
      background: #056fe0;
    }

    .result-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px dashed #d7dde6;
      border-radius: 6px;
      padding: 18px 20px;
      font-size: 18px;
      font-weight: 700;
      color: #666666;
    }

    #result {
      color: #0aae3a;
      font-size: 24px;
    }

    @media (max-width: 520px) {
      .calculator {
        width: 90%;
        padding: 30px 22px;
      }

      .input-row {
        flex-direction: column;
      }

      input,
      select {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="calculator">
    <h2>Mini Calculator</h2>

    <div class="input-row">
      <input type="number" id="num1" value="0" />
      <select id="operator">
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="*">×</option>
        <option value="/">÷</option>
      </select>
      <input type="number" id="num2" value="45" />
    </div>

    <button onclick="calculateAmount()">Calculate Amount</button>

    <div class="result-box">
      <span>Result:</span>
      <span id="result">90</span>
    </div>
  </div>

  <script>
    function calculateAmount() {
      const num1 = parseFloat(document.getElementById('num1').value);
      const num2 = parseFloat(document.getElementById('num2').value);
      const operator = document.getElementById('operator').value;
      const resultEl = document.getElementById('result');

      if (isNaN(num1) || isNaN(num2)) {
        resultEl.textContent = 'Invalid';
        return;
      }

      let result;

      switch (operator) {
        case '+':
          result = num1 + num2;
          break;
        case '-':
          result = num1 - num2;
          break;
        case '*':
          result = num1 * num2;
          break;
        case '/':
          result = num2 !== 0 ? num1 / num2 : 'Error';
          break;
        default:
          result = 'Error';
      }

      resultEl.textContent = result;
    }
  </script>
</body>
</html>
